<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
html, body {
  margin: 0;
  background: transparent;
  overflow: hidden;
  font-family: Arial;
}

#overlay {
  position: absolute;
  top: 20px;
  right: 20px;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 10px 18px;
  border-radius: 30px;
  display: flex;
  gap: 10px;
  align-items: center;
}

#flag {
  width: 20px;
}
</style>
</head>
<body>

<div id="overlay">
  <img id="flag" src="https://flagcdn.com/w40/de.png">
  <span>Hamburg</span>
  <span id="temp">--°C</span>
  <span id="time">--:--</span>
</div>

<script>
const key = "e15f521602b9e7b81a1d10013b4bd2eb";

// Wetter (fest)
async function weather(){
  const w = await fetch(
    `https://api.openweathermap.org/data/2.5/weather?q=Hamburg&units=metric&appid=${key}`
  ).then(r=>r.json());

  document.getElementById("temp").innerText =
    Math.round(w.main.temp) + "°C";
}

// Uhr
function clock(){
  document.getElementById("time").innerText =
    new Date().toLocaleTimeString("de-DE",{hour:"2-digit",minute:"2-digit"});
}

weather();
clock();

setInterval(clock,1000);
setInterval(weather,600000);
</script>

</body>
</html>
