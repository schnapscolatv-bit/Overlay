<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

#overlay {
  position: absolute;
  top: 20px;
  right: 20px;

  background: rgba(15,15,15,0.65);
  backdrop-filter: blur(12px);

  color: white;
  padding: 12px 20px;
  border-radius: 999px;

  font-size: 18px;
  display: flex;
  align-items: center;
  gap: 10px;

  border: 1px solid rgba(255,255,255,0.1);
}

#flag {
  width: 22px;
  height: 16px;
  border-radius: 3px;
}

.divider { opacity: 0.4; }
</style>
</head>

<body>

<div id="overlay">
  <img id="flag">
  <span id="location">Lade...</span>
  <span class="divider">•</span>
  <span id="temp">--°C</span>
  <span class="divider">•</span>
  <span id="time">--:--</span>
</div>

<script>
const API = "e15f521602b9e7b81a1d10013b4bd2eb";

// ⏰ Uhr (läuft IMMER)
function updateTime() {
  document.getElementById("time").textContent =
    new Date().toLocaleTimeString("de-DE", {
      hour: "2-digit",
      minute: "2-digit"
    });
}

// 🎨 Farbe
function updateColor(temp) {
  let color = temp < 10 ? "#00c3ff" :
              temp < 20 ? "#00ff9d" :
              temp < 30 ? "orange" : "red";

  document.getElementById("overlay").style.boxShadow =
    `0 0 15px ${color}`;
}

// 🌍 STABILE IP LOCATION
async function loadData() {
  try {
    // Standort
    const locRes = await fetch("https://ipapi.co/json/");
    const loc = await locRes.json();

    document.getElementById("location").textContent =
      loc.city || loc.country_name;

    document.getElementById("flag").src =
      `https://flagcdn.com/w40/${loc.country_code.toLowerCase()}.png`;

    // Wetter
    const weatherRes = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=${loc.city}&units=metric&appid=${API}`
    );
    const weather = await weatherRes.json();

    const temp = Math.round(weather.main.temp);
    document.getElementById("temp").textContent = temp + "°C";

    updateColor(temp);

  } catch {
    document.getElementById("location").textContent = "Offline";
    document.getElementById("temp").textContent = "--°C";
  }
}

// Start
updateTime();
loadData();

// Backup (falls irgendwas hängt)
setTimeout(loadData, 3000);

setInterval(updateTime, 1000);
setInterval(loadData, 600000);
</script>

</body>
</html>
