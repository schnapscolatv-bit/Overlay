<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  overflow: hidden;
  font-family: Arial, sans-serif;
}

#overlay {
  position: absolute;
  top: 20px;
  right: 20px;

  background: rgba(15,15,15,0.7);
  backdrop-filter: blur(12px);

  color: white;
  padding: 12px 20px;
  border-radius: 999px;

  font-size: 18px;
  display: flex;
  align-items: center;
  gap: 12px;

  border: 1px solid rgba(255,255,255,0.1);
}

#flag {
  width: 24px;
  height: 16px;
  border-radius: 3px;
}

.divider {
  opacity: 0.4;
}
</style>
</head>

<body>

<div id="overlay">
  <img id="flag" src="https://flagcdn.com/w40/de.png">
  <span id="location">Hamburg</span>
  <span class="divider">•</span>
  <span id="temp">--°C</span>
  <span class="divider">•</span>
  <span id="time">--:--</span>
</div>

<script>
const API = "e15f521602b9e7b81a1d10013b4bd2eb";

// ⏰ Uhr läuft IMMER
function updateTime() {
  document.getElementById("time").textContent =
    new Date().toLocaleTimeString("de-DE", {
      hour: "2-digit",
      minute: "2-digit"
    });
}

// 🌡️ Wetter (stabil, feste Stadt)
async function updateWeather() {
  try {
    const res = await fetch(
      `https://api.openweathermap.org/data/2.5/weather?q=Hamburg&units=metric&appid=${API}`
    );
    const data = await res.json();

    const temp = Math.round(data.main.temp);
    document.getElementById("temp").textContent = temp + "°C";

    // Farbe
    let color = temp < 10 ? "#00c3ff" :
                temp < 20 ? "#00ff9d" :
                temp < 30 ? "orange" : "red";

    document.getElementById("overlay").style.boxShadow =
      `0 0 15px ${color}`;

  } catch {
    document.getElementById("temp").textContent = "--°C";
  }
}

// Start
updateTime();
updateWeather();

setInterval(updateTime, 1000);
setInterval(updateWeather, 600000);
</script>

</body>
</html>
